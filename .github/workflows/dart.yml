# Fulminant CI/CD Pipeline
# Fixed: Uses Flutter toolchain instead of Dart-only SDK (TEST-01, TEST-02)
# Fixed: Regenerates mocks before testing (TEST-05)

name: Flutter CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Use Flutter SDK instead of Dart-only SDK (TEST-01, TEST-02)
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.x'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      # Verify formatting
      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      # Analyze with Flutter toolchain
      - name: Analyze project source
        run: flutter analyze

      # Regenerate mocks to ensure they are up-to-date (TEST-05)
      - name: Regenerate mocks
        run: dart run build_runner build --delete-conflicting-outputs

      # Run tests with Flutter toolchain (TEST-01)
      - name: Run tests
        run: flutter test
